name: Update snapshot

on:
  schedule:
    # 21:35 Taipei = 13:35 UTC. After FinLab daily refresh (19:00) and margin refresh (21:30).
    - cron: "35 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scraper
        run: pip install -e ./scraper

      - name: Run scraper
        env:
          FINLAB_API_TOKEN: ${{ secrets.FINLAB_API_TOKEN }}
        working-directory: scraper
        run: python -m scraper.main --output ../web/public/data/snapshot.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/snapshot.json
          if git diff --cached --quiet; then
            echo "No changes to snapshot."
          else
            git commit -m "data: snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
